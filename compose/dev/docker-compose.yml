services:
  app:
    build:
      context: ../..
      dockerfile: compose/dev/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../..:/app
      - app_node_modules:/app/site/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --host 0.0.0.0

volumes:
  app_node_modules:
