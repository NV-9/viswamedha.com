name: viswamedha-dev

services:
  site:
    build:
      context: ../..
      dockerfile: compose/dev/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../../site:/app
      - node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --host 0.0.0.0

volumes:
  node_modules:
