name: Build and Publish Container Image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        id: main_check
        shell: bash
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main. Skipping publish."
          fi

      - name: Set up Docker Buildx
        if: steps.main_check.outputs.on_main == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.main_check.outputs.on_main == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.main_check.outputs.on_main == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=viswamedha.com
            org.opencontainers.image.description=viswamedha.com production image
            org.opencontainers.image.vendor=viswamedha.com
            org.opencontainers.image.licenses=UNLICENSED

      - name: Build and push image
        if: steps.main_check.outputs.on_main == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/prod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}